name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint, Unit Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Android Lint
        run: ./gradlew lint --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Assemble debug APK (build validation)
        run: ./gradlew assembleDebug --stacktrace

      # Verify no INTERNET permission leaked into the merged manifest
      - name: Verify no INTERNET permission in manifest
        run: |
          MANIFEST="app/build/intermediates/merged_manifests/debug/AndroidManifest.xml"
          if grep -q "android.permission.INTERNET" "$MANIFEST"; then
            echo "❌ INTERNET permission found in merged manifest — failing build"
            exit 1
          else
            echo "✅ No INTERNET permission — privacy check passed"
          fi

  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/volumax-release.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          SIGNING_STORE_FILE:      app/volumax-release.jks
          SIGNING_STORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
