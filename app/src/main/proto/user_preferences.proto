syntax = "proto3";

option java_package = "me.rhul.loudr.data";
option java_multiple_files = true;

/**
 * Persisted user preferences for VoluMax.
 * Stored via AndroidX DataStore (Proto) — typed, async, coroutine-safe.
 * No sensitive data is stored here.
 */
message UserPreferences {
    // Normalised boost level: 0.0 = no boost, 1.0 = max (+1500 mB / ~200%)
    float boost_level = 1;

    // Whether the boost engine is currently active
    bool is_enabled = 2;

    // Safety limiter: clamp gain to safety_ceiling_db (default 6.0 dB)
    bool safety_limiter_enabled = 3;
    float safety_ceiling_db = 4;

    // Automatically enable boost when headphones are connected
    bool auto_boost_on_headphone = 5;

    // Theme: "dynamic" | "dark" | "amoled"
    string theme = 6;

    // Optional bass boost (0.0–1.0 normalised)
    float bass_boost_level = 7;
    bool bass_boost_enabled = 8;

    // Per-stream toggles
    bool stream_media_enabled = 9;
    bool stream_call_enabled = 10;
    bool stream_notification_enabled = 11;
    bool stream_alarm_enabled = 12;

    // Floating overlay (off by default)
    bool floating_overlay_enabled = 13;

    // Waveform visualizer (off by default — requires RECORD_AUDIO at runtime)
    bool visualizer_enabled = 14;

    // Per-app boost profiles
    repeated AppProfile app_profiles = 15;
}

message AppProfile {
    string package_name = 1;
    string app_label    = 2;
    float  boost_level  = 3;
    bool   enabled      = 4;
}
